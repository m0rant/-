name: 构建 Android APK

on:
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 配置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: |
          cd $GITHUB_WORKSPACE
          npm init -y
          npm install @bubblewrap/core

      - name: 生成 TWA 项目
        run: |
          cd $GITHUB_WORKSPACE
          node .github/scripts/generate-twa.js

      - name: 构建 APK
        working-directory: twa-project
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: study-timer-apk
          path: twa-project/app/build/outputs/apk/release/*.apk
